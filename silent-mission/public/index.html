<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Mission</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
<script src="i18n.js"></script>
<style>
  body { overflow-x: hidden; }
  .spectator-shell { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .hero-timer { font-size: 7rem; text-align: center; }
  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 30px; }
  @media (max-width: 720px) { .teams-grid { grid-template-columns: 1fr; } }
  .team-block { border-radius: 28px; padding: 28px; text-align: center; }
</style>
</head>
<body>
<div class="spectator-shell">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span data-i18n="app_name"></span></div>
    <button id="lang-toggle" class="lang-toggle">🌐 <span id="lang-toggle-label"></span></button>
  </div>

  <div class="card center" id="spectator-status">
    <p class="muted" data-i18n="waiting_for_host"></p>
  </div>

  <div id="spectator-playing" style="display:none">
    <div class="card">
      <div class="hero-timer" id="hero-timer">00:00</div>
      <p class="center muted" id="active-team-label" style="font-size:1.3rem"></p>
    </div>
  </div>

  <div class="teams-grid">
    <div class="team-block card" id="block-team_a"></div>
    <div class="team-block card" id="block-team_b"></div>
  </div>
</div>

<script>
const socket = io();
let currentState = null;

initLangToggle('lang-toggle');

socket.on('connect', () => socket.emit('register', { as: 'spectator' }));
socket.on('state', (s) => { currentState = s; render(); });
function onLanguageChanged() { render(); }

function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function teamLabel(team) {
  const lang = getLang();
  return team.name[lang] || team.name.ar;
}

function renderTeamBlock(team, isActive) {
  let resultLine = '';
  if (team.result === 'success') resultLine = `<p style="color:var(--teal); font-weight:700; font-size:1.3rem">${t('result_success')} ✅</p>`;
  else if (team.result === 'fail') resultLine = `<p style="color:var(--danger); font-weight:700; font-size:1.3rem">${t('result_fail')} ❌</p>`;
  else if (isActive) resultLine = `<p style="color:var(--gold); font-weight:700">${t('mission_in_progress')}</p>`;

  return `
    <h2 style="color:${team.color}">${teamLabel(team)}</h2>
    ${resultLine}
  `;
}

function render() {
  if (!currentState) return;
  document.getElementById('block-team_a').innerHTML = renderTeamBlock(currentState.teams.team_a, currentState.activeTeamId === 'team_a' && currentState.phase === 'playing');
  document.getElementById('block-team_b').innerHTML = renderTeamBlock(currentState.teams.team_b, currentState.activeTeamId === 'team_b' && currentState.phase === 'playing');

  const statusEl = document.getElementById('spectator-status');
  const playingEl = document.getElementById('spectator-playing');

  if (currentState.phase === 'playing') {
    statusEl.style.display = 'none';
    playingEl.style.display = '';
    document.getElementById('hero-timer').textContent = fmtTime(currentState.timer.remainingSec);
    const activeTeam = currentState.teams[currentState.activeTeamId];
    document.getElementById('active-team-label').textContent = teamLabel(activeTeam);
  } else if (currentState.phase === 'final_result') {
    statusEl.style.display = '';
    playingEl.style.display = 'none';
    const winner = currentState.winnerTeamId ? currentState.teams[currentState.winnerTeamId] : null;
    statusEl.innerHTML = `<div class="big-emoji">🏆</div><h1>${winner ? teamLabel(winner) : ''}</h1><p class="muted">${t('winner_is')}</p>`;
  } else {
    statusEl.style.display = '';
    playingEl.style.display = 'none';
    statusEl.innerHTML = `<p class="muted">${t('waiting_for_host')}</p>`;
  }
}
</script>
</body>
</html>
